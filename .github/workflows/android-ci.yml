name: Android CI — Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  # تقدر تشغله يدوياً من GitHub
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:

      # ١. نزّل الكود
      - name: Checkout code
        uses: actions/checkout@v4

      # ٢. سيت أب Java 17 (مطلوب لـ AGP الحديث)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle          # كاش تلقائي لـ ~/.gradle

      # ٣. كاش إضافي للـ build cache نفسه (بيوفّر وقت كتير)
      - name: Cache Gradle build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ٤ . إذن التنفيذ على gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ٥. بنى الـ APK (debug)
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          # بيقلل من الرسائل الزيادة في الـ log
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

      # ٦. ارفع الـ APK كـ artifact تقدر تنزله من صفحة الـ Actions
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: islamic-prayer-timings-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          # احتفظ بيه ٧ أيام
          retention-days: 7

      # ٧. اطبع مكان الـ APK في الـ log (للتأكد)
      - name: Show APK info
        run: |
          echo "✅ APK built successfully!"
          ls -lh app/build/outputs/apk/debug/app-debug.apk
